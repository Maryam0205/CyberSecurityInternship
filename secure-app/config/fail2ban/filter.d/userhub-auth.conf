# Fail2Ban filter for UserHub Secure (Week 4 Task 1).
#
# The application logs JSON lines to security.log. A failed login looks like:
#   {"level":"warn","message":"Failed login","ip":"203.0.113.5",...}
# A brute-force alert (after threshold from middleware/alert.js) looks like:
#   {"level":"error","message":"ALERT: brute-force suspected from IP","ip":"203.0.113.5",...}
#
# This filter matches both. Fail2Ban then bans the IP at the host firewall.

[Definition]

# Match either a single failed login OR the higher-severity ALERT line.
# `<HOST>` is the Fail2Ban placeholder for the offending IP.
failregex = ^.*"message":"Failed login".*"ip":"<HOST>".*$
            ^.*"message":"ALERT: brute-force suspected from IP".*"ip":"<HOST>".*$
            ^.*"message":"API request rejected: invalid API key".*"ip":"<HOST>".*$

ignoreregex =

# `datepattern` tells fail2ban how to parse the JSON timestamp field. winston
# emits ISO8601 by default (e.g. "timestamp":"2026-06-21T12:34:56.789Z").
datepattern = "timestamp":"%%Y-%%m-%%dT%%H:%%M:%%S
