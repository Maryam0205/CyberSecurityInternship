# Custom ModSecurity rules loaded after the OWASP Core Rule Set
# (Week 6 Bonus — Web Application Firewall).
#
# The CRS image enforces the standard OWASP rules; this file adds project-
# specific allowances and tighter rules. Rule IDs in the 9000000+ range are
# reserved for local use per CRS convention.

# 9000010: never block the static asset path — it gets a lot of false-positive
# scoring from CRS file-extension checks otherwise.
SecRule REQUEST_URI "@beginsWith /styles.css" \
  "id:9000010,phase:1,nolog,allow"

# 9000020: enforce a strict Content-Type on /api/* POSTs.
SecRule REQUEST_URI "@beginsWith /api/" \
  "id:9000020,phase:1,chain,deny,status:415,msg:'/api expects application/json'"
  SecRule REQUEST_METHOD "@streq POST" \
    "chain"
    SecRule REQUEST_HEADERS:Content-Type "!@beginsWith application/json" \
      "t:lowercase"

# 9000030: tighten the auth endpoints — block well-known scanner UAs even
# before the app's rate limiter sees them.
SecRule REQUEST_URI "@beginsWith /login" \
  "id:9000030,phase:1,deny,status:403,msg:'Scanner UA on /login',chain"
  SecRule REQUEST_HEADERS:User-Agent "@pmFromFile scanner-uas.txt" \
    "t:lowercase"

# 9000040: block requests that smell like SQLMap fingerprints even though the
# app uses prepared statements — defence in depth.
SecRule REQUEST_HEADERS:User-Agent "@contains sqlmap" \
  "id:9000040,phase:1,deny,status:403,msg:'sqlmap user agent'"
