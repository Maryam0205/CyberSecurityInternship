# CI security pipeline (Week 6 Task 2).
# Runs npm audit, Trivy on the built image, and ZAP baseline against a
# locally-started copy of the app. Fails the build on HIGH or CRITICAL.

name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1" # Monday 06:17 UTC — weekly cron audit

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci --omit=dev
      - name: Audit (high/critical fails the build)
        run: npm audit --omit=dev --audit-level=high

  trivy:
    name: Trivy container scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t userhub-secure:ci .
      - name: Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: userhub-secure:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  zap-baseline:
    name: OWASP ZAP baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Start app in background
        env:
          NODE_ENV: development
          JWT_SECRET: ci-only-secret-do-not-use-elsewhere-${{ github.run_id }}
          SESSION_SECRET: ci-only-session-${{ github.run_id }}
        run: |
          node server.js &
          for i in 1 2 3 4 5; do
            sleep 2
            curl -sf http://localhost:3000/ && break
          done
      - name: ZAP baseline
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "http://localhost:3000"
          fail_action: false
          allow_issue_writing: false
